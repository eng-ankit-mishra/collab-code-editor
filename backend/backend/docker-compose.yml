services:
  mongodb:
    image: mongo:latest
    container_name: codevspace-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - codevspace-network

  backend:
    build: .
    container_name: codevspace-backend
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    networks:
      - codevspace-network
    env_file:
      - .env

  yjs-server:
    build: ./yjs-server
    container_name: codevspace-yjs
    ports:
      - "1234:1234"
    networks:
      - codevspace-network
    env_file:
      - .env

networks:
  codevspace-network:
    driver: bridge

volumes:
  mongodb_data:



