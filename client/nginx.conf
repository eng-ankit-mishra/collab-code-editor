# 1. Force HTTP to redirect to HTTPS
server {
    listen 80;
    server_name codevspace.codes;
    return 301 https://$host$request_uri;
}

# 2. The Secure HTTPS Server
server {
    listen 443 ssl;
    server_name codevspace.codes;

    # Point to the certificates we passed in from the host
    ssl_certificate /etc/letsencrypt/live/codevspace.codes/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codevspace.codes/privkey.pem;

    # Serve React Frontend
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests securely
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSockets securely (WSS)
    location /ws/ {
        proxy_pass http://yjs-server:1234/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}